name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Give execute permission
        run: chmod +x mvnw

      - name: Run JVM tests
        run: ./mvnw test

  native-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Give execute permission
        run: chmod +x mvnw

      - name: Build native executable
        run: |
          ./mvnw package \
            -Dnative \
            -Dquarkus.native.container-build=true

      - name: Run native tests
        run: |
          ./mvnw verify -Dnative \
            -Dquarkus.native.container-build=true